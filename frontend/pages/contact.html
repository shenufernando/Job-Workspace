<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Job Workspace</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .contact-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
            margin-top: 30px;
        }

        @media(max-width: 768px) {
            .contact-layout {
                grid-template-columns: 1fr;
            }
        }

        .info-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            height: fit-content;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .info-item:last-child {
            margin-bottom: 0;
        }

        .icon-box {
            width: 45px;
            height: 45px;
            background: #EEF2FF;
            color: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <a href="../index.html"
                    style="text-decoration:none; color:inherit; display:flex; gap:10px; align-items:center;">
                    <i class="fas fa-briefcase"></i>
                    <span>Job Workspace</span>
                </a>
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="../index.html" class="nav-link">Home</a>
                <a href="about.html" class="nav-link">About</a>
                <a href="services.html" class="nav-link">Services</a>
                <a href="contact.html" class="nav-link active">Contact</a>
            </div>
        </div>
    </nav>

    <div class="container" style="padding: 60px 20px;">
        <div style="text-align: center; margin-bottom: 40px;">
            <h1 style="font-size: 2.5rem; color: var(--dark-color);">Get in Touch</h1>
            <p style="color: #666;">Have questions? We'd love to hear from you.</p>
        </div>

        <div class="contact-layout">
            <div class="form-container" style="margin: 0; max-width: 100%;">
                <h2 style="margin-bottom: 20px;">Send us a Message</h2>
                <form id="contactForm">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="form-group">
                            <label for="name">Your Name</label>
                            <input type="text" id="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
                </form>
            </div>

            <div style="display: flex; flex-direction: column; gap: 20px;">
                <div class="info-card">
                    <div class="info-item">
                        <div class="icon-box"><i class="fas fa-envelope"></i></div>
                        <div>
                            <h4 style="margin:0;">Email</h4>
                            <p style="margin:0; color:#666;">support@jobworkspace.com</p>
                        </div>
                    </div>
                    <div class="info-item">
                        <div class="icon-box"><i class="fas fa-phone"></i></div>
                        <div>
                            <h4 style="margin:0;">Phone</h4>
                            <p style="margin:0; color:#666;">+94 11 234 5678</p>
                        </div>
                    </div>
                    <div class="info-item">
                        <div class="icon-box"><i class="fas fa-map-marker-alt"></i></div>
                        <div>
                            <h4 style="margin:0;">Office</h4>
                            <p style="margin:0; color:#666;">Colombo 03, Sri Lanka</p>
                        </div>
                    </div>
                </div>

                <div
                    style="border-radius: 10px; overflow: hidden; height: 250px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                    <iframe
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d63371.80385595338!2d79.8211859679169!3d6.921919702206771!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3ae253d10f7a7003%3A0x320b2e4d32d3838d!2sColombo%2C%20Sri%20Lanka!5e0!3m2!1sen!2sus!4v1625687421543!5m2!1sen!2sus"
                        width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
                    </iframe>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 Job Workspace. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="../js/main.js"></script>
    <script>
        // Auth Logic for Nav
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            const navMenu = document.getElementById('navMenu');
            if (token) {
                // Authenticated: Add Logout
                const a = document.createElement('a');
                a.href = "#"; a.className = "nav-link"; a.style.color = "#EF4444"; a.innerText = "Logout";
                a.onclick = () => { localStorage.clear(); window.location.href = "../index.html"; };
                navMenu.appendChild(a);
            } else {
                // Public: Add Login/Signup
                navMenu.innerHTML += `<a href="login.html" class="nav-link">Login</a> <a href="signup.html" class="btn btn-primary">Sign Up</a>`;
            }
        });

        document.getElementById('contactForm').addEventListener('submit', (e) => {
            e.preventDefault();
            showAlert('Thank you! Your message has been sent successfully.', 'success');
            document.getElementById('contactForm').reset();
        });
    </script>
</body>

</html>
