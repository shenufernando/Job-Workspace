<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Job Workspace</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .auth-wrapper {
            display: flex;
            min-height: calc(100vh - 68px);
        }

        /* Left decorative panel — premium gradient split */
        .auth-image {
            flex: 1;
            background: linear-gradient(145deg, #1e3a8a 0%, #1d4ed8 35%, #2563eb 60%, #0ea5e9 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            padding: 52px 48px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Decoration blobs */
        .auth-image::before {
            content: '';
            position: absolute;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .06);
            top: -80px;
            right: -80px;
        }

        .auth-image::after {
            content: '';
            position: absolute;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .05);
            bottom: -60px;
            left: -60px;
        }

        .auth-image-inner {
            position: relative;
            z-index: 2;
        }

        .auth-image h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 14px;
            color: var(--white);
            line-height: 1.2;
        }

        .auth-image p {
            font-size: 1rem;
            color: rgba(255, 255, 255, .82);
            line-height: 1.7;
            max-width: 340px;
        }

        /* Stat pills on the left panel */
        .auth-stats {
            display: flex;
            gap: 16px;
            margin-top: 32px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .auth-stat {
            background: rgba(255, 255, 255, .14);
            border: 1px solid rgba(255, 255, 255, .22);
            border-radius: 12px;
            padding: 12px 20px;
            text-align: center;
        }

        .auth-stat strong {
            display: block;
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--white);
            letter-spacing: -1px;
        }

        .auth-stat span {
            font-size: 0.78rem;
            color: rgba(255, 255, 255, .70);
            text-transform: uppercase;
            letter-spacing: .5px;
            font-weight: 600;
        }

        /* Right form panel */
        .auth-form-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: var(--bg);
        }

        .auth-card {
            background: var(--white);
            padding: 44px;
            border-radius: var(--r-2xl);
            box-shadow: var(--shadow-xl);
            border: 1px solid var(--border-subtle);
            width: 100%;
            max-width: 460px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-header h2 {
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -.7px;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .auth-header p {
            color: var(--text-secondary);
            font-size: 0.92rem;
        }

        /* Input with icon */
        .input-group {
            position: relative;
            margin-bottom: 18px;
        }

        .input-group>i.field-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        .input-group input {
            width: 100%;
            padding: 13px 14px 13px 42px;
            border: 1.5px solid var(--slate-200);
            border-radius: var(--r-md);
            font-family: var(--font);
            font-size: 0.93rem;
            background: var(--slate-50);
            color: var(--text-primary);
            outline: none;
            transition: all var(--duration) var(--ease);
        }

        .input-group input:focus {
            border-color: var(--primary);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, .12);
        }

        .input-group .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-muted);
            transition: color var(--duration) var(--ease);
        }

        .input-group .toggle-password:hover {
            color: var(--primary);
        }

        .form-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 0.88rem;
            color: var(--text-secondary);
        }

        .form-row label {
            display: flex;
            align-items: center;
            gap: 7px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .auth-image {
                display: none;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <a href="../index.html" style="text-decoration:none;display:flex;gap:10px;align-items:center;">
                    <i class="fas fa-briefcase"></i>
                    <span>Job Workspace</span>
                </a>
            </div>
            <div class="nav-menu">
                <a href="../index.html" class="nav-link">Home</a>
                <a href="signup.html" class="btn btn-primary">Sign Up</a>

                <div class="language-selector">
                    <div id="google_translate_element"></div>
                </div>
            </div>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-image">
            <div class="auth-image-inner">
                <h1>Welcome Back!</h1>
                <p>"Choose a job you love, and you will never have to work a day in your life."</p>
                <div class="auth-stats">
                    <div class="auth-stat"><strong>500+</strong><span>Jobs Posted</span></div>
                    <div class="auth-stat"><strong>1k+</strong><span>Workers</span></div>
                    <div class="auth-stat"><strong>4.9★</strong><span>Rated</span></div>
                </div>
            </div>
        </div>

        <div class="auth-form-container">
            <div class="auth-card">
                <div class="auth-header">
                    <h2>Login to your account</h2>
                    <p>Don't have an account? <a href="signup.html">Sign up free</a></p>
                </div>

                <form id="loginForm">
                    <div class="form-group">
                        <label>Username or Email</label>
                        <div class="input-group">
                            <i class="fas fa-envelope field-icon"></i>
                            <input type="text" id="username" placeholder="name@example.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-group">
                            <i class="fas fa-lock field-icon"></i>
                            <input type="password" id="password" placeholder="••••••••" required>
                            <i class="far fa-eye toggle-password" id="togglePassword" onclick="togglePassword()"></i>
                        </div>
                    </div>

                    <div class="form-row">
                        <label><input type="checkbox"> Remember me</label>
                        <a href="#">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width:100%;">
                        Login
                    </button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/main.js"></script>
    <script>
        redirectIfAuthenticated();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showAlert('Please enter both email/username and password', 'error');
                return;
            }

            // UI Loading State
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

            try {
                const response = await apiRequest('/login', {
                    method: 'POST',
                    body: JSON.stringify({ username_or_email: username, password: password })
                });

                if (response.token && response.user) {
                    setAuthToken(response.token);
                    setCurrentUser(response.user);

                    showAlert('Login successful! Redirecting...', 'success');

                    setTimeout(() => {
                        if (response.user.role === 'admin') window.location.href = 'admin-dashboard.html';
                        else if (response.user.role === 'provider') window.location.href = 'provider-dashboard.html';
                        else window.location.href = 'worker-dashboard.html';
                    }, 1000);
                } else {
                    throw new Error('Invalid response from server');
                }
            } catch (error) {
                let msg = error.message;
                if (msg.includes('401')) msg = 'Invalid credentials. Please try again.';
                showAlert(msg, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });

        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('togglePassword');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>

    <!-- Google Translate Script -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'en,si,ta',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript"
        src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>

</html>
