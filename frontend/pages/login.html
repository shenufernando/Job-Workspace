<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Job Workspace</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Split Layout Styles */
        .auth-wrapper {
            display: flex;
            min-height: calc(100vh - 76px);
            /* Subtract navbar height */
        }

        .auth-image {
            flex: 1;
            background: linear-gradient(rgba(79, 70, 229, 0.85), rgba(67, 56, 202, 0.85)), url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 40px;
            text-align: center;
        }

        .auth-form-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: #f9fafb;
        }

        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
        }

        /* Input Group with Icon */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #9CA3AF;
        }

        .input-group input {
            width: 100%;
            padding: 12px 12px 12px 45px;
            /* Space for icon */
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .input-group .toggle-password {
            left: auto;
            right: 15px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .auth-image {
                display: none;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <a href="../index.html"
                    style="text-decoration:none; color:inherit; display:flex; gap:10px; align-items:center;">
                    <i class="fas fa-briefcase"></i>
                    <span>Job Workspace</span>
                </a>
            </div>
            <div class="nav-menu">
                <a href="../index.html" class="nav-link">Home</a>
                <a href="signup.html" class="btn btn-primary">Sign Up</a>
            </div>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-image">
            <div>
                <h1 style="font-size: 2.5rem; margin-bottom: 20px;">Welcome Back!</h1>
                <p style="font-size: 1.2rem; opacity: 0.9;">
                    "Choose a job you love, and you will never have to work a day in your life."
                </p>
            </div>
        </div>

        <div class="auth-form-container">
            <div class="auth-card">
                <div style="text-align: center; margin-bottom: 30px;">
                    <h2 style="color: var(--dark-color); margin-bottom: 10px;">Login to your account</h2>
                    <p style="color: #666;">Don't have an account? <a href="signup.html"
                            style="color: var(--primary-color);">Sign up free</a></p>
                </div>

                <form id="loginForm">
                    <div class="form-group">
                        <label>Username or Email</label>
                        <div class="input-group">
                            <i class="fas fa-envelope"></i>
                            <input type="text" id="username" placeholder="name@example.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="••••••••" required>
                            <i class="far fa-eye toggle-password" id="togglePassword" onclick="togglePassword()"></i>
                        </div>
                    </div>

                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; font-size: 0.9rem;">
                        <label style="display: flex; align-items: center; cursor: pointer;">
                            <input type="checkbox" style="margin-right: 8px;"> Remember me
                        </label>
                        <a href="#" style="color: var(--primary-color); text-decoration: none;">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; font-size: 1rem;">
                        Login
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        redirectIfAuthenticated();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showAlert('Please enter both email/username and password', 'error');
                return;
            }

            // UI Loading State
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

            try {
                const response = await apiRequest('/login', {
                    method: 'POST',
                    body: JSON.stringify({ username_or_email: username, password: password })
                });

                if (response.token && response.user) {
                    setAuthToken(response.token);
                    setCurrentUser(response.user);

                    showAlert('Login successful! Redirecting...', 'success');

                    setTimeout(() => {
                        if (response.user.role === 'admin') window.location.href = 'admin-dashboard.html';
                        else if (response.user.role === 'provider') window.location.href = 'provider-dashboard.html';
                        else window.location.href = 'worker-dashboard.html';
                    }, 1000);
                } else {
                    throw new Error('Invalid response from server');
                }
            } catch (error) {
                let msg = error.message;
                if (msg.includes('401')) msg = 'Invalid credentials. Please try again.';
                showAlert(msg, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });

        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('togglePassword');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>

</html>
