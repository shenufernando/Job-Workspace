<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Job Workspace</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .auth-wrapper {
            display: flex;
            min-height: calc(100vh - 68px);
        }

        /* Left panel — premium gradient split */
        .auth-image {
            flex: 1;
            background: linear-gradient(145deg, #064e3b 0%, #065f46 30%, #0d9488 65%, #2563eb 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            padding: 52px 48px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .auth-image::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .06);
            top: -70px;
            right: -70px;
        }

        .auth-image::after {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .05);
            bottom: -55px;
            left: -55px;
        }

        .auth-image-inner {
            position: relative;
            z-index: 2;
        }

        .auth-image h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 14px;
            color: var(--white);
            line-height: 1.2;
        }

        .auth-image p {
            font-size: 1rem;
            color: rgba(255, 255, 255, .82);
            line-height: 1.7;
            max-width: 340px;
        }

        .auth-stats {
            display: flex;
            gap: 14px;
            margin-top: 28px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .auth-stat {
            background: rgba(255, 255, 255, .14);
            border: 1px solid rgba(255, 255, 255, .22);
            border-radius: 12px;
            padding: 10px 18px;
            text-align: center;
        }

        .auth-stat strong {
            display: block;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--white);
            letter-spacing: -1px;
        }

        .auth-stat span {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, .70);
            text-transform: uppercase;
            letter-spacing: .4px;
            font-weight: 600;
        }

        .auth-form-container {
            flex: 1.2;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: var(--bg);
        }

        .auth-card {
            background: var(--white);
            padding: 40px;
            border-radius: var(--r-2xl);
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 560px;
            border: 1px solid var(--border-subtle);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .auth-header h2 {
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -.7px;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .auth-header p {
            color: var(--text-secondary);
            font-size: 0.92rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 16px;
        }

        .input-group i.field-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        .input-group .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            cursor: pointer;
            z-index: 10;
            transition: color var(--duration) var(--ease);
        }

        .input-group .toggle-password:hover {
            color: var(--primary);
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 13px 42px;
            border: 1.5px solid var(--slate-200);
            border-radius: var(--r-md);
            font-family: var(--font);
            font-size: 0.93rem;
            outline: none;
            background: var(--slate-50);
            color: var(--text-primary);
            transition: all var(--duration) var(--ease);
        }

        .input-group input:focus,
        .input-group textarea:focus {
            border-color: var(--primary);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, .12);
        }

        /* Role selector */
        .role-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .role-option {
            flex: 1;
            border: 2px solid var(--slate-200);
            border-radius: var(--r-lg);
            padding: 14px;
            text-align: center;
            cursor: pointer;
            transition: all var(--duration) var(--ease);
            opacity: .65;
            font-weight: 500;
        }

        .role-option i {
            font-size: 1.4rem;
            margin-bottom: 6px;
            display: block;
        }

        .role-option:hover {
            border-color: var(--primary);
            opacity: 1;
        }

        .role-option.active {
            border-color: var(--primary);
            background: var(--primary-light);
            color: var(--primary);
            opacity: 1;
            font-weight: 700;
        }

        @media (max-width: 900px) {
            .auth-image {
                display: none;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <a href="../index.html" style="text-decoration:none;display:flex;gap:10px;align-items:center;">
                    <i class="fas fa-briefcase"></i>
                    <span>Job Workspace</span>
                </a>
            </div>
            <div class="nav-menu">
                <a href="../index.html" class="nav-link">Home</a>
                <a href="login.html" class="nav-link">Login</a>

                <div class="language-selector">
                    <div id="google_translate_element"></div>
                </div>
            </div>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-image">
            <div class="auth-image-inner">
                <h1>Join the Community</h1>
                <p>&laquo;Opportunities don't happen, you create them.&raquo;</p>
                <div class="auth-stats">
                    <div class="auth-stat"><strong>500+</strong><span>Jobs Posted</span></div>
                    <div class="auth-stat"><strong>1k+</strong><span>Workers</span></div>
                </div>
            </div>
        </div>

        <div class="auth-form-container">
            <div class="auth-card">
                <div class="auth-header">
                    <h2>Create Account</h2>
                    <p>Already have an account? <a href="login.html">Login</a></p>
                </div>

                <form id="signupForm">
                    <label style="display:block; margin-bottom:10px; font-weight:600;">I want to:</label>
                    <div class="role-selector">
                        <div class="role-option active" onclick="selectRole('worker')">
                            <i class="fas fa-hard-hat"></i>
                            Find Work
                        </div>
                        <div class="role-option" onclick="selectRole('provider')">
                            <i class="fas fa-user-tie"></i>
                            Hire Workers
                        </div>
                    </div>
                    <input type="hidden" id="role" value="worker">

                    <div class="form-group">
                        <div class="input-group">
                            <i class="fas fa-user field-icon"></i>
                            <input type="text" id="name" placeholder="Full Name" required>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="input-group">
                            <i class="fas fa-envelope field-icon"></i>
                            <input type="email" id="email" placeholder="Email Address" required>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-phone field-icon"></i>
                            <input type="tel" id="phone" placeholder="Phone Number" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="input-group">
                            <i class="fas fa-map-marker-alt field-icon" style="top: 20px;"></i>
                            <textarea id="address" placeholder="Residential Address" required rows="2"
                                style="resize:none;"></textarea>
                        </div>
                    </div>

                    <div id="workerFields">
                        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 15px;">
                            <div class="input-group">
                                <i class="fas fa-briefcase field-icon"></i>
                                <input type="text" id="position" placeholder="Job Title (e.g. Plumber)">
                            </div>
                            <div class="input-group">
                                <i class="fas fa-star field-icon"></i>
                                <input type="number" id="experience" placeholder="Exp (Yrs)" min="0">
                            </div>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="input-group">
                            <i class="fas fa-lock field-icon"></i>
                            <input type="password" id="password" placeholder="Password" required minlength="6">
                            <i class="fas fa-eye toggle-password" onclick="togglePassword('password', this)"></i>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-lock field-icon"></i>
                            <input type="password" id="confirmPassword" placeholder="Confirm" required>
                            <i class="fas fa-eye toggle-password" onclick="togglePassword('confirmPassword', this)"></i>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width:100%; margin-top:10px;">
                        Sign Up
                    </button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/main.js"></script>
    <script>
        redirectIfAuthenticated();

        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // Check URL for role preference
        const urlParams = new URLSearchParams(window.location.search);
        const roleParam = urlParams.get('role');
        if (roleParam && ['worker', 'provider'].includes(roleParam)) {
            selectRole(roleParam);
        }

        function selectRole(role) {
            document.getElementById('role').value = role;
            document.querySelectorAll('.role-option').forEach(el => el.classList.remove('active'));

            const index = role === 'worker' ? 0 : 1;
            document.querySelectorAll('.role-option')[index].classList.add('active');

            // Toggle worker specific fields
            const workerFields = document.getElementById('workerFields');
            if (role === 'worker') {
                workerFields.style.display = 'block';
                document.getElementById('position').required = true;
            } else {
                workerFields.style.display = 'none';
                document.getElementById('position').required = false;
            }
        }

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showAlert('Passwords do not match', 'error');
                return;
            }

            const role = document.getElementById('role').value;
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                role: role,
                password: password,
                confirm_password: confirmPassword
            };

            if (role === 'worker') {
                formData.position = document.getElementById('position').value;
                formData.experience = parseInt(document.getElementById('experience').value) || 0;
            }

            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating Account...';

            try {
                await apiRequest('/register', {
                    method: 'POST',
                    body: JSON.stringify(formData)
                });

                showAlert('Registration successful! Redirecting to login...', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            } catch (error) {
                showAlert(error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });
    </script>

    <!-- Google Translate Script -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'en,si,ta',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript"
        src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>

</html>
